{% extends "base.html" %}

{% block content %}
<div class="admin-shell">
  <aside class="admin-sidebar">
    <a href="{{ url_for('admin_dashboard') }}" class="{{ 'active' if request.endpoint == 'admin_dashboard' }}">Dashboard</a>
    <a href="{{ url_for('admin_services') }}" class="{{ 'active' if 'admin_service' in (request.endpoint or '') }}">Services</a>
    <a href="{{ url_for('admin_gallery') }}" class="{{ 'active' if 'admin_gallery' in (request.endpoint or '') }}">Gallery</a>
    <a href="{{ url_for('admin_testimonials') }}" class="{{ 'active' if 'admin_testimonial' in (request.endpoint or '') }}">Testimonials</a>
    <a href="{{ url_for('admin_quotes') }}" class="{{ 'active' if 'admin_quote' in (request.endpoint or '') }}">Quotes</a>
    <a href="{{ url_for('admin_faqs') }}" class="{{ 'active' if 'admin_faq' in (request.endpoint or '') }}">FAQ</a>
    <a href="{{ url_for('admin_settings') }}" class="{{ 'active' if request.endpoint == 'admin_settings' }}">Settings</a>
    <a href="{{ url_for('admin_logout') }}" style="margin-top: 2rem; color: var(--error);">Sign Out</a>
    <a href="{{ url_for('home') }}" style="color: var(--text-dim);">← View Site</a>
  </aside>
  <div class="admin-main">
    {% block admin_content %}{% endblock %}
  </div>
</div>
{% endblock %}
